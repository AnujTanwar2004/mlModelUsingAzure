<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris Vision Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Azure ML Live Scoring</p>
        <h1>Iris Vision Lab</h1>
        <p class="subtitle">
          A full-stack UI that sends flower measurements to your Azure ML endpoint
          and shows predictions instantly.
        </p>
      </section>

      <section class="card input-card">
        <h2>Flower Features</h2>
        <form id="score-form" class="form-grid">
          <label>
            Sepal Length
            <input type="number" step="0.01" id="sepal_length" value="5.1" required />
          </label>
          <label>
            Sepal Width
            <input type="number" step="0.01" id="sepal_width" value="3.5" required />
          </label>
          <label>
            Petal Length
            <input type="number" step="0.01" id="petal_length" value="1.4" required />
          </label>
          <label>
            Petal Width
            <input type="number" step="0.01" id="petal_width" value="0.2" required />
          </label>

          <div class="button-row">
            <button type="button" id="sample-btn" class="ghost-btn">Try Random Sample</button>
            <button type="submit" class="primary-btn">Predict Species</button>
          </div>
        </form>
      </section>

      <section class="card result-card">
        <h2>Prediction Result</h2>
        <div id="result" class="result waiting">
          Waiting for prediction...
        </div>
        <pre id="raw-response" class="raw-response"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
